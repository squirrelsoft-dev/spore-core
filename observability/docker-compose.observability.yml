version: "3.8"

services:

  # ── Trace storage ──────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "4317:4317"   # OTLP gRPC — harness sends spans here
      - "4318:4318"   # OTLP HTTP — alternative endpoint
      - "3200:3200"   # Tempo query API (Grafana reads from here)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Log aggregation ─────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki-data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Log shipping ─────────────────────────────────────────────────────────────
  # Watches .spore/sessions/**/*.jsonl and ships to Loki automatically.
  # No harness code changes needed — Alloy tails the files directly.
  alloy:
    image: grafana/alloy:latest
    volumes:
      - ./alloy.river:/etc/alloy/config.river
      - ${SPORE_WORKSPACE:-.}/..:/workspace:ro
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy

  # ── Metrics ──────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  # ── UI ───────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin   # no login for local dev
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - GF_LOG_LEVEL=warn
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"   # open http://localhost:3000
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
      prometheus:
        condition: service_started

volumes:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:
