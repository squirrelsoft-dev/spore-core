services:

  # ── Trace storage ──────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "4317:4317"   # OTLP gRPC — harness sends spans here
      - "4318:4318"   # OTLP HTTP — alternative endpoint
      - "3200:3200"   # Tempo query API (Grafana reads from here)
    # NOTE: the tempo/loki images are distroless (no wget/curl), so an
    # in-container HTTP healthcheck can't run. Alloy and Grafana retry their
    # connections on startup, so plain service_started dependencies suffice.

  # ── Log aggregation ─────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki-data:/loki
    ports:
      - "3100:3100"

  # ── Log shipping ─────────────────────────────────────────────────────────────
  # Watches .spore/sessions/**/*.jsonl and ships to Loki automatically.
  # No harness code changes needed — Alloy tails the files directly.
  alloy:
    image: grafana/alloy:latest
    # The image's default entrypoint loads /etc/alloy/config.alloy. We mount our
    # config there and pass an explicit `run` command so our pipeline (not the
    # image's bundled default config) is what runs.
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./alloy.river:/etc/alloy/config.alloy
      - ${SPORE_WORKSPACE:-.}/..:/workspace:ro
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started

  # ── Metrics ──────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  # ── LLM-native trace backend (#64) ───────────────────────────────────────────
  # Arize Phoenix renders the actual conversation + tool calls from the
  # gen_ai.* span events the harness emits. It is an alternative OTLP target to
  # Tempo, selected via SPORE_OTLP_ENDPOINT (single endpoint, no fan-out).
  # Point the harness at Phoenix for LLM debugging:
  #   SPORE_TRACE_CONTENT=1 SPORE_OTLP_ENDPOINT=http://localhost:6317 <run>
  # then open the UI at http://localhost:6006. Tempo stays on 4317 for system
  # telemetry; Phoenix's gRPC collector is remapped to 6317 to avoid the clash.
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"   # Phoenix UI + HTTP OTLP collector — open http://localhost:6006
      - "6317:4317"   # OTLP gRPC collector — SPORE_OTLP_ENDPOINT=http://localhost:6317
    volumes:
      - phoenix-data:/mnt/data

  # ── UI ───────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin   # no login for local dev
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - GF_LOG_LEVEL=warn
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"   # open http://localhost:3000
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
      prometheus:
        condition: service_started

volumes:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:
  phoenix-data:
