name: go

on:
  push:
    paths:
      - "go/**"
      - "fixtures/**"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "go/**"
      - "fixtures/**"
      - ".github/workflows/go.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: |
            go/spore-core/go.sum
            go/spore-cli/go.sum
            go/spore-eval/go.sum
      - name: Format check
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "gofmt found unformatted files:"
            echo "$fmt_out"
            exit 1
          fi
      - name: Vet
        run: |
          for m in spore-core spore-cli spore-eval; do
            (cd "$m" && go vet ./...)
          done
      - name: Test
        run: |
          for m in spore-core spore-cli spore-eval; do
            (cd "$m" && go test ./...)
          done
