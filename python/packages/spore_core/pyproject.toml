[project]
name = "spore-core"
version = "0.0.0"
description = "spore-core harness runtime library"
requires-python = ">=3.12"
dependencies = [
    "anyio>=4.13.0",
    "httpx>=0.28",
    "opentelemetry-api>=1.27",
    "opentelemetry-exporter-otlp-proto-grpc>=1.27",
    "opentelemetry-sdk>=1.27",
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spore_core"]
