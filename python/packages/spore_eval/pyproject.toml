[project]
name = "spore-eval"
version = "0.0.0"
description = "spore-core evaluation harness"
requires-python = ">=3.12"
dependencies = [
    "spore-core",
    "spore-tools",
    "anyio>=4.13.0",
    "pydantic>=2",
]

[project.scripts]
spore-e2e-agent = "spore_eval.e2e_agent:main"
spore-eval = "spore_eval.eval_cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spore_eval"]

[tool.uv.sources]
spore-core = { workspace = true }
spore-tools = { workspace = true }
