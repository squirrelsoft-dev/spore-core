[project]
name = "spore-tools"
version = "0.0.0"
description = "Standard Tool implementations for spore-core"
requires-python = ">=3.12"
dependencies = [
    "spore-core",
    "httpx>=0.28",
    "anyio>=4.13.0",
    "pydantic>=2",
    "pathspec>=0.12",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spore_tools"]

[tool.uv.sources]
spore-core = { workspace = true }

[dependency-groups]
dev = [
    "pytest-httpx>=0.35",
]
